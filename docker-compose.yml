services:
  postgres:
    image: postgres:16
    container_name: dealership-postgres-app
    environment:
      POSTGRES_DB: dealership
      POSTGRES_USER: dealership
      POSTGRES_PASSWORD: dealership
    ports:
      - "55433:5432"
    volumes:
      - dealership_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealership -d dealership"]
      interval: 5s
      timeout: 3s
      retries: 20

  dealership-app:
    build: .
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      # overrides spring.datasource.url from application.yml
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dealership

      # overrides spring.datasource.username
      SPRING_DATASOURCE_USERNAME: dealership

      # overrides spring.datasource.password
      SPRING_DATASOURCE_PASSWORD: dealership

      # overrides spring.data.redis.host
      SPRING_DATA_REDIS_HOST: redis

      # overrides spring.data.redis.port
      SPRING_DATA_REDIS_PORT: 6379

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  dealership_pgdata: